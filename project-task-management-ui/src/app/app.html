<nz-layout class="app-layout">
  <nz-sider
    class="menu-sidebar"
    nzCollapsible
    nzWidth="256px"
    nzBreakpoint="md"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null"
  >
    <div class="sidebar-logo">
      <a href="./app.html">
        <img [src]="logo" alt="logo" />
        <h1>إدارة المشاريع</h1>
      </a>
    </div>
    <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed">
      <li nz-submenu nzOpen nzTitle="المشاريع" nzIcon="project">
        <ul>
          <!-- Project Items -->

          @for (project of projects; track project.id) {
            <li nz-menu-item nzMatchRouter>
              <a [routerLink]="['/projects', project.id]" class="project-name">
                {{ project.name }}
              </a>
            </li>
          }
        </ul>
      </li>
    </ul>
  </nz-sider>

  <nz-layout>
    <nz-header>
      <div class="app-header">
        <span class="header-trigger" (click)="isCollapsed = !isCollapsed">
          <nz-icon class="trigger" [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'" />
        </span>
      </div>
      <div class="header-right">
        <nz-badge nzDot [nzOffset]="[-24, 3]">
          <span nz-icon nzType="bell" nzTheme="outline"></span>
        </nz-badge>
        <div class="user-profile">
          <nz-avatar
            nzSrc="https://randomuser.me/api/portraits/men/32.jpg"
            nzSize="default"
          ></nz-avatar>
        </div>
      </div>
    </nz-header>

    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
