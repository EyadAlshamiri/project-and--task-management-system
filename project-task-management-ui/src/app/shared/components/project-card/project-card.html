<nz-card [nzBordered]="false" class="project-card">
  <ng-container *ngIf="!loading; else skeletonTemplate">
    <div class="card-header">
      <div class="title-section">
        <h3 class="project-title">{{ project.tilte }}</h3>
        <p class="task-count">{{ project.tasksCount }} مهمة</p>
      </div>
      <div class="more-options">
        <button
          nz-button
          nzType="text"
          nz-dropdown
          [nzDropdownMenu]="menu"
          (click)="$event.stopPropagation()"
        >
          <span nz-icon nzType="more" nzTheme="outline"></span>
        </button>
        <nz-dropdown-menu #menu="nzDropdownMenu">
          <ul nz-menu>
            <li nz-menu-item (click)="showModal(project)">تعديل</li>
            <li
              nz-menu-item
              nzDanger
              nz-popconfirm
              nzPopconfirmTitle="هل أنت متأكد من أنك تريد حذف المشروع?"
              (nzOnConfirm)="deleteProject(project.id)"
            >
              حذف
            </li>
          </ul>
        </nz-dropdown-menu>
      </div>
    </div>

    <div class="card-body">
      <div class="badges-row">
        <div class="status-badge" [ngClass]="getStatusClass(project.status)">
          {{ getStatusLabel(project.status) }}
        </div>
        <div class="priority-badge" [ngClass]="getPriorityClass(project.priority)">
          {{ getPriorityLabel(project.priority) }}
        </div>
      </div>

      <div class="team-section">
        <nz-avatar-group>
          <ng-container *ngFor="let avatar of getMemberAvatars().slice(0, 3)">
            <nz-avatar
              [nzText]="avatar.initial"
              [style.background-color]="avatar.color"
              [nzTooltipTitle]="avatar.name"
              nz-tooltip
              nzSize="small"
            ></nz-avatar>
          </ng-container>
          <nz-avatar
            *ngIf="extraMembers > 0"
            [nzText]="'+' + extraMembers"
            style="background-color: #f5f5f5; color: #999"
            nzSize="small"
          ></nz-avatar>
        </nz-avatar-group>
      </div>
    </div>

    <div class="progress-section">
      <nz-progress
        [nzPercent]="getProgress(project)"
        [nzStrokeColor]="getProgressColor(getProgress(project))"
        nzSize="small"
        [nzShowInfo]="true"
      ></nz-progress>
    </div>
  </ng-container>

  <ng-template #skeletonTemplate>
    <div class="card-header">
      <div class="title-section" style="width: 100%">
        <nz-skeleton-element
          nzType="input"
          [nzActive]="true"
          style="width: 70%; height: 28px; border-radius: 4px"
        ></nz-skeleton-element>
        <nz-skeleton-element
          nzType="input"
          [nzActive]="true"
          nzSize="small"
          style="width: 30%; margin-top: 8px; border-radius: 4px"
        ></nz-skeleton-element>
      </div>
    </div>
    <div class="card-body">
      <nz-skeleton-element
        nzType="button"
        [nzActive]="true"
        nzSize="small"
        style="width: 60px"
      ></nz-skeleton-element>
      <div class="team-section">
        <nz-skeleton-element
          nzType="avatar"
          [nzActive]="true"
          nzSize="small"
          *ngFor="let i of [1, 2, 3]"
        ></nz-skeleton-element>
      </div>
    </div>
    <div class="card-footer">
      <nz-skeleton-element
        nzType="input"
        [nzActive]="true"
        nzSize="small"
        style="width: 100%"
      ></nz-skeleton-element>
    </div>
  </ng-template>
</nz-card>
