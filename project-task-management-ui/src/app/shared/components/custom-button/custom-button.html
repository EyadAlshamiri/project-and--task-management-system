<button 
  nz-button 
  [nzType]="type" 
  [disabled]="disabled" 
  [type]="htmlType"
  [nzBlock]="block"
  [nzDanger]="danger"
  [nzSize]="size"
  class="app-custom-button"
  (click)="onClick($event)"
>
  <span nz-icon [nzType]="icon" *ngIf="icon"></span>
  <ng-content></ng-content>
  {{ label }}
</button>
